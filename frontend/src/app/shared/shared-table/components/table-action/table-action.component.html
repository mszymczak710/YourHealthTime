@if (action.icon) {
  <button
    [wvwPermissionDisabled]="action.permissions"
    [color]="action.color"
    mat-icon-button
    [matTooltip]="action.label"
    (click)="action.action(row)"
  >
    <mat-icon [svgIcon]="action.icon"></mat-icon>
  </button>
} @else {
  <button
    [wvwPermissionDisabled]="action.permissions"
    [color]="action.color"
    mat-flat-button
    [matTooltip]="action.label"
    (click)="action.action(row)"
  >
    {{ action.label }}
  </button>
}
